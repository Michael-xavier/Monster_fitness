# ─── Monster Fitness — Nginx Reverse Proxy ────────────────────────────────────
# Segurança: rate limiting dupla camada, HSTS, CSP, .git bloqueado,
#            sem server tokens, buffer limits (DDoS básico), logs de acesso.

worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Oculta versão do Nginx (security misconfiguration) ──────────────────
    server_tokens off;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip            on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript;

    # ── Proteção DDoS básica — limitar tamanho de corpo ─────────────────────
    client_max_body_size     2m;
    client_body_buffer_size  16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout  12s;
    client_header_timeout 12s;
    send_timeout         10s;

    # ── Rate limiting zones (dupla camada: Nginx + Flask-Limiter) ────────────
    limit_req_zone  $binary_remote_addr zone=api_limit:10m   rate=30r/m;
    limit_req_zone  $binary_remote_addr zone=auth_limit:10m  rate=10r/m;
    limit_req_zone  $binary_remote_addr zone=global_limit:10m rate=100r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ── Upstream: Flask API ──────────────────────────────────────────────────
    upstream flask_api {
        server api:5000;
        keepalive 16;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Servidor HTTP — redireciona para HTTPS em produção
    # Em desenvolvimento, serve diretamente na porta 80.
    # Para ativar HTTPS: descomente o bloco 443 e configure certificados.
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Rate limit global ────────────────────────────────────────────────
        limit_req  zone=global_limit burst=50 nodelay;
        limit_conn conn_limit 20;

        # ── Security Headers (OWASP recomendados) ────────────────────────────
        add_header X-Frame-Options              "DENY"                              always;
        add_header X-Content-Type-Options       "nosniff"                           always;
        add_header X-XSS-Protection             "1; mode=block"                     always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"   always;
        add_header Permissions-Policy           "geolocation=(), microphone=(), camera=()" always;
        # HSTS — ativa após configurar HTTPS/SSL (descomente em produção):
        # add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains; preload" always;
        add_header Content-Security-Policy
            "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src fonts.gstatic.com cdn.jsdelivr.net; img-src 'self' data:; connect-src 'self';"
            always;

        # ── Bloqueia acesso ao .git e arquivos sensíveis ──────────────────────
        location ~ /\.git {
            deny all;
            return 404;
        }
        location ~ \.(env|py|cfg|ini|sql|log|bak|sh)$ {
            deny all;
            return 404;
        }
        location ~ /\. {
            deny all;
            return 404;
        }

        # ── Arquivos estáticos — servidos pelo Nginx (fast path) ──────────────
        location /static/ {
            alias /app/static/;
            expires 7d;
            add_header Cache-Control "public, no-transform";
            # Sem source maps em produção
            location ~ \.map$ {
                deny all;
                return 404;
            }
            access_log off;
        }

        # ── Health check interno ───────────────────────────────────────────────
        location /health {
            proxy_pass http://flask_api/health;
            access_log off;
            limit_req  zone=api_limit burst=5 nodelay;
        }

        # ── Rotas de autenticação (rate limit mais restrito) ───────────────────
        location ~ ^/api/(login|cadastro|csrf-token) {
            limit_req zone=auth_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass         http://flask_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 15s;
            proxy_connect_timeout 5s;
        }

        # ── Demais rotas da API ────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=15 nodelay;
            limit_req_status 429;

            proxy_pass         http://flask_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── Páginas (Flask renderiza HTML) ─────────────────────────────────────
        location / {
            proxy_pass         http://flask_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
        }
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Bloco HTTPS (descomentar em produção com certificado SSL/TLS)
    # ─────────────────────────────────────────────────────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name monsterfitness.com.br;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    #     # ... (repetir os outros headers e locations do bloco HTTP acima)
    # }
}
