version: "3.9"

# ─── Monster Fitness — Docker Compose ────────────────────────────────────────
# Segurança:
#  - Secrets via variáveis de ambiente (.env — nunca no repositório)
#  - DB não exposto externamente (apenas na rede interna mf_net)
#  - API não exposta externamente (Nginx é o único ponto de entrada)
#  - Healthcheck no MySQL antes de subir a API
#  - restart: unless-stopped para disponibilidade

services:

  # ── Nginx — Único ponto de entrada público ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: mf_nginx
    ports:
      - "80:80"
      # - "443:443"   # Habilitar com certificado SSL em produção
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro   # somente leitura
      - ./static:/app/static:ro                         # somente leitura
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mf_net
    # Sem variáveis de ambiente com secrets no Nginx

  # ── Flask API — nunca exposta diretamente ───────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mf_api
    environment:
      FLASK_ENV: production          # desativa debug mode
      FLASK_DEBUG: "false"           # garante debug desligado
      SECRET_KEY: ${SECRET_KEY}      # obrigatório — sem fallback inseguro
      JWT_SECRET: ${JWT_SECRET}      # obrigatório — sem fallback inseguro
      JWT_EXPIRY_HOURS: "8"
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: monsterfitness
      DB_USER: mf_user
      DB_PASSWORD: ${DB_PASSWORD}    # obrigatório via .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mf_net
    expose:
      - "5000"    # expõe apenas na rede interna, não para o host
    # Usuário não-root (definido no Dockerfile)
    read_only: false   # gunicorn precisa de /tmp

  # ── MySQL 8 — isolado na rede interna ────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mf_db
    environment:
      MYSQL_DATABASE:      monsterfitness
      MYSQL_USER:          mf_user
      MYSQL_PASSWORD:      ${DB_PASSWORD}       # via .env
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}  # via .env
    volumes:
      - mf_db_data:/var/lib/mysql               # dados persistentes
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "mf_user", "--password=${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - mf_net
    expose:
      - "3306"    # SEM ports: — banco nunca acessível fora da rede Docker

volumes:
  mf_db_data:
    driver: local   # dados persistem mesmo após docker compose down

networks:
  mf_net:
    driver: bridge
